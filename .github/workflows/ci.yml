name: CI/CD

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Deploy PocketBase
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /pocketbase
      PB_USER: pocketbase
 
    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # ── 2. Setup PocketBase ───────────────────────────────────────
      - name: Setup PocketBase
        run: |
          URL=$(curl -s https://api.github.com/repos/pocketbase/pocketbase/releases/latest | jq -r '.assets[] | select(.name | test("linux_amd64.zip$")) | .browser_download_url')
          wget -q -O pocketbase.zip $URL
          unzip -o pocketbase.zip
          chmod +x pocketbase
          ./pocketbase --version
 
      # ── 3. Set up SSH ────────────────────────────────────────────────────────
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
 
      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
 
      # ── 4. Upload PocketBase binary ─────────────────────────────────────────
      - name: Upload PocketBase binary
        run: |
          scp -o StrictHostKeyChecking=accept-new \
            pocketbase \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_PATH}/
          
          # Optional: Verify upload was successful
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "ls -lh ${DEPLOY_PATH}/pocketbase"

          
        
