name: CI/CD
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
jobs:
  deploy:
    name: Build & Deploy PocketBase
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: .   

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PocketBase
        run: |
          URL=$(curl -s https://api.github.com/repos/pocketbase/pocketbase/releases/latest | jq -r '.assets[] | select(.name | test("linux_amd64.zip$")) | .browser_download_url')
          wget -q -O pocketbase.zip $URL
          unzip -o pocketbase.zip
          chmod +x pocketbase
          ./pocketbase --version

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p ~/pocketbase"

      - name: Upload PocketBase binary
        run: |
          scp pocketbase \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/pocketbase/

      - name: Sync pb_hooks
        run: |
          rsync -avz --delete \
            --exclude='.gitkeep' \
            pb_hooks/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}/pocketbase/pb_hooks/
 
      - name: Sync pb_migrations
        run: |
          rsync -avz \
            --exclude='.gitkeep' \
            pb_migrations/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}/pocketbase/pb_migrations/

      - name: Set permissions and restart service
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash << 'EOF'
            chmod +x ~/pocketbase/pocketbase
            ~/pocketbase/pocketbase --version
      
            # Reload config in case it changed, then start or restart
            supervisorctl reread
            supervisorctl update
      
            if supervisorctl status pocketbase | grep -q RUNNING; then
              supervisorctl restart pocketbase
            else
              supervisorctl start pocketbase
            fi
          EOF
