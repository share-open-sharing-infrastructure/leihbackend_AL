name: CI/CD

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Deploy PocketBase
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /pocketbase
      PB_USER: pocketbase
 
    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # ── 2. Setup PocketBase ───────────────────────────────────────
      - name: Setup PocketBase
        run: |
          URL=$(curl -s https://api.github.com/repos/pocketbase/pocketbase/releases/latest | jq -r '.assets[] | select(.name | test("linux_amd64.zip$")) | .browser_download_url')
          wget -q -O pocketbase.zip $URL
          unzip -o pocketbase.zip
          chmod +x pocketbase
          ./pocketbase --version
 
      # ── 3. Set up SSH ────────────────────────────────────────────────────────
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
 
      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
 
      # ── 5. Upload PocketBase binary ─────────────────────────────────────────
      - name: Upload PocketBase binary
        run: |
          scp pocketbase \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_PATH}/
 
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            chmod +x ${DEPLOY_PATH}/
          "
 
      # ── 6. Sync pb_hooks ────────────────────────────────────────────────────
      - name: Sync pb_hooks
        run: |
          rsync -avz --delete \
            --exclude='.gitkeep' \
            pb_hooks/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_PATH}/pb_hooks/
 
      # ── 7. Sync pb_migrations ───────────────────────────────────────────────
      - name: Sync pb_migrations
        run: |
          rsync -avz \
            --exclude='.gitkeep' \
            pb_migrations/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_PATH}/pb_migrations/
 
      # ── 8. Sync scripts ─────────────────────────────────────────────────────
      - name: Sync scripts
        run: |
          rsync -avz \
            --exclude='.gitkeep' \
            scripts/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_PATH}/scripts/
 
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            chmod +x ${DEPLOY_PATH}/scripts/*.sh 2>/dev/null || true
          "
 
      # ── 9. Install / update systemd service ─────────────────────────────────
      - name: Install systemd service
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            tee /etc/systemd/system/pocketbase.service > /dev/null <<'EOF'
          [Unit]
          Description=PocketBase
          After=network.target
 
          [Service]
          Type=simple
          User=${PB_USER}
          WorkingDirectory=${DEPLOY_PATH}
          ExecStart=${DEPLOY_PATH}/pocketbase serve \
            --http=0.0.0.0:8090 \
            --dir=${DEPLOY_PATH}/pb_data \
            --hooksDir=${DEPLOY_PATH}/pb_hooks \
            --migrationsDir=${DEPLOY_PATH}/pb_migrations
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
 
          [Install]
          WantedBy=multi-user.target
          EOF
            systemctl daemon-reload
            systemctl enable pocketbase
          "
 
      # ── 10. Run pre-deploy script (optional) ────────────────────────────────
      - name: Run pre-deploy script
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            if [ -f ${DEPLOY_PATH}/scripts/pre-deploy.sh ]; then
              bash ${DEPLOY_PATH}/scripts/pre-deploy.sh
            fi
          "
 
      # ── 11. Restart PocketBase ───────────────────────────────────────────────
      - name: Restart PocketBase
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            systemctl restart pocketbase
            sleep 3
            systemctl is-active --quiet pocketbase && \
              echo 'PocketBase is running' || \
              (echo 'PocketBase failed to start' && journalctl -u pocketbase -n 20 --no-pager && exit 1)
          "
 
      # ── 12. Run post-deploy script (optional) ───────────────────────────────
      - name: Run post-deploy script
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            if [ -f ${DEPLOY_PATH}/scripts/post-deploy.sh ]; then
              bash ${DEPLOY_PATH}/scripts/post-deploy.sh
            fi
          "
 
