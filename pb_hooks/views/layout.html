<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{{block "title" .}}Leihladen im Commonszentrum{{end}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: sans-serif;
        }

        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            min-height: 100vh;
        }

        header {
            margin-bottom: 30px;
            background-color: rgb(89, 122, 216);
            padding: 40px 30px 10px 40px;
        }

        header svg {
            max-width: 300px;
            height: auto;
        }

        header svg path,
        header svg rect {
            fill: white !important;
        }

        main {
            margin-bottom: 80px;
            padding: 0 40px;
        }

        footer {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        footer svg {
            max-width: 150px;
            height: auto;
        }
        
        .redblock {
            height: 30px;
            margin-top: 40px;
            background-color: #597ad8;
        }
    </style>
</head>
<body>
<header>
    <svg width="100%" height="100%" viewBox="0 0 471 104" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
<g transform="matrix(1,0,0,1,-175,-413.278711)">
    <g id="leihlokal" transform="matrix(4.418249,0,0,4.418249,-2250.839654,-1926.02284)">
        <text x="549" y="552" style="font-family: sans-serif; font-size: 6px; font-weight: bold; fill: white;">Leihladen im Commonszentrum</text>
    </g>
</g>
    </svg><br>
    <p style="font-weight: bold; color: white; padding: 20px 0;">Ausleihen ist das neue Kaufen.</p>
</header>

<main>
    {{block "body" .}}
    {{end}}
</main>

<hr />
<footer>
    <p style="white-space: pre;">
    Dein Team vom Leihladen im Commonszentrum
    
    Kunkelberg 2
    D-21335 Lüneburg
    kontakt@commonszentrum.de
  
    So - 11-15 Uhr
    </p>
</footer>
<div class="redblock"></div>
</body>
</html>
