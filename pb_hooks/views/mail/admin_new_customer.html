{{define "body"}}
<p><strong>Neue Registrierung</strong></p>

<p>Ein neuer Nutzer hat sich registriert:</p>

<table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
    <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px 0; font-weight: bold; width: 180px;">Name:</td>
        <td style="padding: 12px 0;">{{.firstname}} {{.lastname}}</td>
    </tr>
    <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px 0; font-weight: bold;">Nutzernummer:</td>
        <td style="padding: 12px 0;">{{.iid}}</td>
    </tr>
    <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px 0; font-weight: bold;">E-Mail:</td>
        <td style="padding: 12px 0;">{{.email}}</td>
    </tr>
    <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px 0; font-weight: bold;">Registriert am:</td>
        <td style="padding: 12px 0;">{{.registered_on}}</td>
    </tr>
</table>

<p style="margin-top: 40px; font-size: 12px; color: #666; font-style: italic;">Diese Email wurde automatisch generiert.</p>
{{end}}
